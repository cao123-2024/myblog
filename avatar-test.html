<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
.comment-avatar { width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.04);background-size:cover;background-position:center; }
.profile-avatar-lg { width:90px;height:90px;border-radius:50%;border:3px solid rgba(15,15,15,0.5);background-size:cover;background-position:center; }
body { background:#080808;color:#e8e8e8;font-family:system-ui;padding:40px; }
</style></head><body>
<h3>Test 1: Nav avatar (data URI in cssUrl)</h3>
<div id="nav-test" class="comment-avatar" style="width:32px;height:32px"></div>
<p>Nav CSS: <code id="nav-css"></code></p>
<h3>Test 2: Profile avatar (data URI in cssUrl)</h3>
<div id="profile-test" class="profile-avatar-lg"></div>
<p>Profile CSS: <code id="profile-css"></code></p>
<h3>Test 3: Plain svg (no base64)</h3>
<div class="comment-avatar" id="plain-test" style="width:32px;height:32px"></div>
<p>Plain CSS: <code id="plain-css"></code></p>
<script>
var svgToBase64 = function(s) { return btoa(encodeURIComponent(s).replace(/%([0-9A-F]{2})/g,function(_,p){return String.fromCharCode(parseInt(p,16));}));};
var cssUrl = function(u) { if(!u) return 'none'; var s = u.replace(/'/g,"%27").replace(/\)/g,"%29").replace(/"/g,"%22"); return "url('"+s+"')"; };
var svg = '<svg viewBox="0 0 100 100"><rect width="100" height="100" rx="50" fill="#FF6347"/></svg>';
var uri = 'data:image/svg+xml;base64,' + svgToBase64(svg);
document.getElementById('nav-test').style.backgroundImage = cssUrl(uri);
document.getElementById('nav-css').textContent = 'background-image:'+cssUrl(uri);
document.getElementById('profile-test').style.backgroundImage = cssUrl(uri);
document.getElementById('profile-css').textContent = 'background-image:'+cssUrl(uri);
document.getElementById('plain-test').style.backgroundImage = cssUrl(uri);
document.getElementById('plain-css').textContent = 'background-image:'+cssUrl(uri);
</script></body></html>
